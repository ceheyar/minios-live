name: CI

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get upgrade
        sudo apt-get install -y debootstrap xorriso genisoimage binutils squashfs-tools grub-pc-bin grub-efi-amd64-bin dosfstools mtools xz-utils liblz4-tool zstd git curl rsync
        sudo apt-get clean

    - name: Create symlink
      run: |
        ln -s ../../scripts/10-clonezilla/ linux-live/environments/lxqt/10-clonezilla
        ln -s ../../scripts/10-devel/ linux-live/environments/lxqt/10-devel
        ln -s ../../scripts/10-google-chrome/ linux-live/environments/lxqt/10-google-chrome
        ln -s ../../scripts/10-gparted/ linux-live/environments/lxqt/10-gparted
        ln -s ../../scripts/10-rescuezilla/ linux-live/environments/lxqt/10-rescuezilla
        ln -s ../../scripts/10-vlc/ linux-live/environments/lxqt/10-vlc
        ln -s ../../scripts/10-vscode/ linux-live/environments/lxqt/10-vscode

    - name: Run build
      run: |
        echo "Starting build..."
        sudo ./minios-live -
        echo "Build completed."

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: minios-iso
        path: build/iso/minios-*.iso
        compression-level: 9

    - name: Release
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        name: minios-iso
        files: build/iso/minios-*.iso
        tag_name: ${{ github.run_id }}
